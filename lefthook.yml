pre-commit:
  parallel: true
  commands:
    frontend-check:
      root: "frontend/"
      run: npx biome check .
      glob: "*.{ts,tsx,js,jsx,json}"
    rust-clippy:
      run: cargo clippy --workspace -- -D warnings
      files: git diff --cached --name-only --diff-filter=ACMR
      glob: "*.rs"
    rust-fmt:
      run: cargo fmt --check
      files: git diff --cached --name-only --diff-filter=ACMR
      glob: "*.rs"

pre-push:
  commands:
    rust-check:
      run: cargo check --workspace