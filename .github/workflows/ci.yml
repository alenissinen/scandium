name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Check formatting
        run: nix develop --command cargo fmt --check

      - name: Clippy
        run: nix develop --command cargo clippy --workspace -- -D warnings

      - name: Tests
        run: nix develop --command cargo test --workspace
        env:
          SQLX_OFFLINE: "true"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install dependencies
        run: nix develop --command bash -c "cd frontend && npm ci --ignore-scripts"

      - name: Lint and format
        run: nix develop --command bash -c "cd frontend && npm run check"

      - name: Build
        run: nix develop --command bash -c "cd frontend && npm run build"
